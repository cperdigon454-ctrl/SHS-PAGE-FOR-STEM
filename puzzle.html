<meta charset="UTF-8">

</head>
<body>

<h1>Image Sliding Puzzle</h1>

<div id="info">
    Time: <span id="time">0</span>s |
    Score: <span id="score">0</span>
</div>

<button onclick="startGame()">Shuffle</button>

<div id="puzzle"></div>
 
<script>
  let timerInterval;
let time = 0;
let score = 0;
let size = 4;
let pieces = [];

function startTimer(){
    clearInterval(timerInterval);
    time = 0;
    document.getElementById("time").textContent = time;
    timerInterval = setInterval(()=>{
        time++;
        document.getElementById("time").textContent = time;
    },1000);
}

function updateScore(){
    score++;
    document.getElementById("score").textContent = score;
}

function startGame(){
    score = 0;
    document.getElementById("score").textContent = score;

    pieces = [];
    for(let i=0;i<15;i++) pieces.push(i);
    pieces.push(null);

    shuffle(pieces);
    startTimer();
    render();
}

function render(){
    const puzzle = document.getElementById("puzzle");
    puzzle.innerHTML="";

    pieces.forEach((p,i)=>{
        let div=document.createElement("div");
        div.className="tile";

        if(p===null){
            div.classList.add("empty");
        }else{
            div.style.backgroundImage="url('https://picsum.photos/320')";
            div.style.backgroundSize="320px 320px";

            let row=Math.floor(p/size);
            let col=p%size;
            div.style.backgroundPosition=`-${col*80}px -${row*80}px`;

            div.onclick=()=>move(i);
        }

        puzzle.appendChild(div);
    });
}

function move(i){
    let empty=pieces.indexOf(null);
    let valid=[i-1,i+1,i-4,i+4];

    if(valid.includes(empty) &&
    ((Math.abs(i-empty)==1 && Math.floor(i/4)==Math.floor(empty/4)) ||
     Math.abs(i-empty)==4)){

        [pieces[i],pieces[empty]]=[pieces[empty],pieces[i]];
        updateScore();
        render();
        checkWin();
    }
}

function checkWin(){
    for(let i=0;i<15;i++){
        if(pieces[i]!==i){
            return;
        }
    }
    clearInterval(timerInterval);
    alert("Puzzle Completed! Time: " + time + " seconds. Moves: " + score);
}

function shuffle(arr){
    for(let i=arr.length-1;i>0;i--){
        let j=Math.floor(Math.random()*(i+1));
        [arr[i],arr[j]]=[arr[j],arr[i]];
    }
}

startGame();
</script>
